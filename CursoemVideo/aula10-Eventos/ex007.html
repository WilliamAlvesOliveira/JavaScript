<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somando números</title>
    <style>
        h1{
            text-align: center;
        }
        p{
            text-align: center;
        }
        #res{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Somando valores</h1>
    <p>
        <input type="number" name="txtn1" id="txtn1"> + 
        <input type="number" name="txtn2" id="txtn2">
    </p>
    <p><input type="button" value="somar" id="soma" onclick="somar()"></p> <!--podemos por na tag onclick="somar()"-->
    <div id="res">Resultado</div>

    <script>
        let titulomod = window.document.querySelector('h1')
        titulomod.style.textDecoration = 'underline'
        function somar(){
            const tn1 = window.document.getElementById('txtn1')
            const tn2 = window.document.getElementById('txtn2')
            const res = window.document.getElementById('res')
            const n1 = Number(tn1.value)
            const n2 = Number(tn2.value)
            let s = n1 + n2
            res.innerHTML = `A soma de ${n1} + ${n2} é igual a: ${s}`
        }
    </script>
    
</body>
</html>
